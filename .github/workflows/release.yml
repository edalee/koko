name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend deps
        run: cd frontend && npm ci

      - name: Build macOS app
        run: wails build -platform darwin/universal

      - name: Create zip (for Homebrew)
        run: |
          cd build/bin
          zip -r "../../Koko-${GITHUB_REF_NAME}-macOS.zip" Koko.app

      - name: Create DMG
        run: |
          DMG_NAME="Koko-${GITHUB_REF_NAME}-macOS.dmg"
          mkdir -p dmg-staging
          cp -R "build/bin/Koko.app" "dmg-staging/Koko.app"
          ln -s /Applications dmg-staging/Applications
          hdiutil create -volname "Koko" \
            -srcfolder dmg-staging \
            -ov -format UDZO \
            "$DMG_NAME"

      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: |
            *.dmg
            *.zip

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.0-dev \
            pkg-config \
            libfuse2

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend deps
        run: cd frontend && npm ci

      - name: Build Linux binary
        run: wails build -platform linux/amd64

      - name: Create AppImage
        run: |
          VERSION="${GITHUB_REF_NAME}"
          APPDIR="Koko.AppDir"

          wget -q "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage" -O appimagetool
          chmod +x appimagetool

          mkdir -p "${APPDIR}/usr/bin"
          mkdir -p "${APPDIR}/usr/share/icons/hicolor/256x256/apps"
          cp build/bin/Koko "${APPDIR}/usr/bin/koko"
          cp build/appicon.png "${APPDIR}/usr/share/icons/hicolor/256x256/apps/koko.png"
          cp build/appicon.png "${APPDIR}/koko.png"

          cat > "${APPDIR}/koko.desktop" << 'DESKTOP'
          [Desktop Entry]
          Name=Koko
          Exec=koko
          Icon=koko
          Type=Application
          Categories=Development;
          Comment=Unified workspace for Claude Code sessions
          DESKTOP
          sed -i 's/^          //' "${APPDIR}/koko.desktop"

          cat > "${APPDIR}/AppRun" << 'APPRUN'
          #!/bin/bash
          SELF="$(readlink -f "$0")"
          HERE="${SELF%/*}"
          exec "${HERE}/usr/bin/koko" "$@"
          APPRUN
          chmod +x "${APPDIR}/AppRun"

          ARCH=x86_64 ./appimagetool "${APPDIR}" "Koko-${VERSION}-linux-x86_64.AppImage"

      - uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: "*.AppImage"

  release:
    needs: [build-macos, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/*.dmg
            artifacts/*.zip
            artifacts/*.AppImage

  update-homebrew:
    needs: [release]
    runs-on: ubuntu-latest
    steps:
      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download macOS zip
        run: |
          gh release download "${GITHUB_REF_NAME}" \
            --repo edalee/koko \
            --pattern "*.zip" \
            --dir .
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Compute SHA256
        id: sha
        run: echo "sha256=$(shasum -a 256 *.zip | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Update Homebrew Cask
        run: |
          git clone https://x-access-token:${TAP_TOKEN}@github.com/edalee/homebrew-koko.git tap
          cd tap

          cat > Casks/koko.rb << CASK
          cask "koko" do
            version "${{ steps.version.outputs.version }}"
            sha256 "${{ steps.sha.outputs.sha256 }}"

            url "https://github.com/edalee/koko/releases/download/v#{version}/Koko-v#{version}-macOS.zip"
            name "Koko"
            desc "Unified workspace for Claude Code sessions"
            homepage "https://github.com/edalee/koko"

            app "Koko.app"

            zap trash: [
              "~/Library/Application Support/koko",
              "~/Library/Preferences/com.koko.app.plist",
            ]
          end
          CASK
          sed -i 's/^          //' Casks/koko.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/koko.rb
          git commit -m "chore: bump koko to ${{ steps.version.outputs.version }}"
          git push
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
