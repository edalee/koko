name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend deps
        run: cd frontend && npm ci

      - name: Build macOS app
        run: wails build -platform darwin/universal

      - name: Create DMG
        run: |
          APP_NAME="Kõkõ"
          DMG_NAME="Koko-${GITHUB_REF_NAME}-macOS.dmg"

          # Create DMG staging directory
          mkdir -p dmg-staging
          cp -R "build/bin/Koko.app" "dmg-staging/${APP_NAME}.app"
          ln -s /Applications dmg-staging/Applications

          # Create DMG
          hdiutil create -volname "$APP_NAME" \
            -srcfolder dmg-staging \
            -ov -format UDZO \
            "$DMG_NAME"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: "*.dmg"

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.0-dev \
            pkg-config \
            libfuse2

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend deps
        run: cd frontend && npm ci

      - name: Build Linux binary
        run: wails build -platform linux/amd64

      - name: Create AppImage
        run: |
          VERSION="${GITHUB_REF_NAME}"
          APPDIR="Koko.AppDir"

          # Download AppImage tooling
          wget -q "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage" -O appimagetool
          chmod +x appimagetool

          # Create AppDir structure
          mkdir -p "${APPDIR}/usr/bin"
          mkdir -p "${APPDIR}/usr/share/icons/hicolor/256x256/apps"
          cp build/bin/Koko "${APPDIR}/usr/bin/koko"
          cp build/appicon.png "${APPDIR}/usr/share/icons/hicolor/256x256/apps/koko.png"
          cp build/appicon.png "${APPDIR}/koko.png"

          # Desktop entry
          cat > "${APPDIR}/koko.desktop" << 'DESKTOP'
          [Desktop Entry]
          Name=Kõkõ
          Exec=koko
          Icon=koko
          Type=Application
          Categories=Development;
          Comment=Unified workspace for Claude Code sessions
          DESKTOP

          # Remove leading whitespace from heredoc
          sed -i 's/^          //' "${APPDIR}/koko.desktop"

          # AppRun entry point
          cat > "${APPDIR}/AppRun" << 'APPRUN'
          #!/bin/bash
          SELF="$(readlink -f "$0")"
          HERE="${SELF%/*}"
          exec "${HERE}/usr/bin/koko" "$@"
          APPRUN
          chmod +x "${APPDIR}/AppRun"

          # Build AppImage
          ARCH=x86_64 ./appimagetool "${APPDIR}" "Koko-${VERSION}-linux-x86_64.AppImage"

      - uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: "*.AppImage"

  release:
    needs: [build-macos, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/*.dmg
            artifacts/*.AppImage
