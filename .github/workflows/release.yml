name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend deps
        run: cd frontend && npm ci

      - name: Build macOS app
        run: wails build -platform darwin/universal

      - name: Ad-hoc codesign
        run: codesign -s - --force build/bin/Koko.app

      - name: Create tar.gz (for Homebrew formula)
        run: tar -czf "Koko-${GITHUB_REF_NAME}-macOS.tar.gz" -C build/bin Koko.app

      - name: Create DMG
        run: |
          DMG_NAME="Koko-${GITHUB_REF_NAME}-macOS.dmg"
          mkdir -p dmg-staging
          cp -R "build/bin/Koko.app" "dmg-staging/Koko.app"
          ln -s /Applications dmg-staging/Applications
          hdiutil create -volname "Koko" \
            -srcfolder dmg-staging \
            -ov -format UDZO \
            "$DMG_NAME"

      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: |
            *.dmg
            *.tar.gz

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.0-dev \
            pkg-config \
            libfuse2

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend deps
        run: cd frontend && npm ci

      - name: Build Linux binary
        run: wails build -platform linux/amd64

      - name: Create AppImage
        run: |
          VERSION="${GITHUB_REF_NAME}"
          APPDIR="Koko.AppDir"

          wget -q "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage" -O appimagetool
          chmod +x appimagetool

          mkdir -p "${APPDIR}/usr/bin"
          mkdir -p "${APPDIR}/usr/share/icons/hicolor/256x256/apps"
          cp build/bin/Koko "${APPDIR}/usr/bin/koko"
          cp build/appicon.png "${APPDIR}/usr/share/icons/hicolor/256x256/apps/koko.png"
          cp build/appicon.png "${APPDIR}/koko.png"

          cat > "${APPDIR}/koko.desktop" << 'DESKTOP'
          [Desktop Entry]
          Name=Koko
          Exec=koko
          Icon=koko
          Type=Application
          Categories=Development;
          Comment=Unified workspace for Claude Code sessions
          DESKTOP
          sed -i 's/^          //' "${APPDIR}/koko.desktop"

          cat > "${APPDIR}/AppRun" << 'APPRUN'
          #!/bin/bash
          SELF="$(readlink -f "$0")"
          HERE="${SELF%/*}"
          exec "${HERE}/usr/bin/koko" "$@"
          APPRUN
          chmod +x "${APPDIR}/AppRun"

          ARCH=x86_64 ./appimagetool "${APPDIR}" "Koko-${VERSION}-linux-x86_64.AppImage"

      - uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: "*.AppImage"

  release:
    needs: [build-macos, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/*.dmg
            artifacts/*.tar.gz
            artifacts/*.AppImage

  update-homebrew:
    needs: [release]
    runs-on: ubuntu-latest
    steps:
      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download macOS tar.gz
        run: |
          gh release download "${GITHUB_REF_NAME}" \
            --repo edalee/koko \
            --pattern "*.tar.gz" \
            --dir .
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Compute SHA256
        id: sha
        run: echo "sha256=$(shasum -a 256 *.tar.gz | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Update Homebrew Formula
        run: |
          git clone https://x-access-token:${TAP_TOKEN}@github.com/edalee/homebrew-koko.git tap
          cd tap

          mkdir -p Formula
          cat > Formula/koko.rb << FORMULA
          class Koko < Formula
            desc "Unified workspace for Claude Code sessions"
            homepage "https://github.com/edalee/koko"
            url "https://github.com/edalee/koko/releases/download/v${{ steps.version.outputs.version }}/Koko-v${{ steps.version.outputs.version }}-macOS.tar.gz"
            sha256 "${{ steps.sha.outputs.sha256 }}"
            version "${{ steps.version.outputs.version }}"

            depends_on :macos

            def install
              prefix.install "Koko.app"
            end

            def post_install
              # Clear quarantine to prevent XProtect from stripping the unsigned binary
              system "xattr", "-cr", "#{prefix}/Koko.app"
              # Symlink to /Applications for Finder/Launchpad visibility
              ln_sf "#{prefix}/Koko.app", "/Applications/Koko.app"
            end

            def caveats
              <<~EOS
                Koko.app has been linked to /Applications.

                The app is not notarized. On first launch macOS may block it:
                  1. Open Koko from /Applications or Launchpad
                  2. Go to System Settings → Privacy & Security
                  3. Click "Open Anyway"
              EOS
            end

            test do
              assert_predicate prefix/"Koko.app/Contents/MacOS/Koko", :exist?
            end
          end
          FORMULA
          sed -i 's/^          //' Formula/koko.rb

          # Remove old Cask if it exists
          rm -f Casks/koko.rb
          rmdir Casks 2>/dev/null || true

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: bump koko to ${{ steps.version.outputs.version }}"
          git push
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
